name: Build to test PR

on:
  pull_request:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Build binary
        run: cargo build --release
      - name: Create tarball
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            ARCH_NAME="x86_64"
          elif [ "$ARCH" = "aarch64" ]; then
            ARCH_NAME="aarch64"
          fi
          mkdir -p keymux-linux-${ARCH_NAME}
          mv target/release/keymux keymux-linux-${ARCH_NAME}/
          cp keymux.service keymux-niri.service keymux-linux-${ARCH_NAME}/ 2>/dev/null || true
          cp README.md LICENSE config.example.ron keymux-linux-${ARCH_NAME}/ 2>/dev/null || true
          tar -czf keymux-linux-${ARCH_NAME}.tar.gz -C keymux-linux-${ARCH_NAME} .
      - name: Generate checksum
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            ARCH_NAME="x86_64"
          elif [ "$ARCH" = "aarch64" ]; then
            ARCH_NAME="aarch64"
          fi
          sha256sum keymux-linux-${ARCH_NAME}.tar.gz > keymux-linux-${ARCH_NAME}.sha256
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: keymux-linux
          path: |
            keymux-linux-*.tar.gz
            keymux-linux-*.sha256
